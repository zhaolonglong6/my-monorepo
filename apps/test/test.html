<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script type="module">
        import { ref,effect } from '../reactivity/dist/index.js';
        
        
        const count = ref(0)
        console.log(count.value);
        effect(
            ()=>{return console.log('变化了',count.value)}
        )
        
        setTimeout(()=>{
            count.value++
        },1000)
    </script>
